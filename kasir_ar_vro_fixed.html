<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR VRO-ULTIMATE LIMITED LIVE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        :root { --hijau-ar: #1b5e20; --biru-vro: #0288d1; --emas-vro: #ff9800; --merah-vro: #b71c1c; }
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 480px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .vro-header { text-align: center; border-bottom: 3px double var(--hijau-ar); padding-bottom: 10px; margin-bottom: 15px; }
        .vro-header h2 { margin: 0; color: var(--hijau-ar); font-size: 24px; letter-spacing: -1px; }
        .vro-header span { font-size: 11px; font-weight: 900; color: var(--biru-vro); text-transform: uppercase; }

        .grid-top { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .btn-top { padding: 10px 5px; border: none; border-radius: 8px; color: white; font-weight: 900; font-size: 10px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-top:active { transform: scale(0.95); }

        #liveWindow { display:none; position:fixed; bottom: 20px; right: 20px; width: 220px; height: 350px; background: #000; border: 3px solid var(--emas-vro); border-radius: 15px; z-index: 8000; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .live-header { background: var(--emas-vro); padding: 5px 10px; font-size: 10px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #liveContent { width: 100%; height: calc(100% - 25px); border: none; }

        #mediaOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index: 8500; }
        #cameraView { width:100%; height:80%; object-fit: cover; }
        .media-controls { height:20%; display:flex; justify-content:space-around; align-items:center; background:#111; padding: 0 10px; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index: 9000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; box-sizing: border-box; border: 3px solid var(--biru-vro); }
        textarea#inputTempel { width: 100%; height: 220px; border: 1px solid #ccc; border-radius: 8px; padding: 12px; font-weight: bold; box-sizing: border-box; resize: none; font-size: 14px; background: #f9f9f9; }

        /* ===== MODAL GALERI ===== */
        #modalGaleri { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:9100; align-items:center; justify-content:center; }
        #modalGaleri .modal-content { border-color: var(--emas-vro); max-height: 90vh; overflow-y: auto; }
        #previewGaleri { width:100%; max-height:200px; object-fit:contain; border-radius:8px; border:1px solid #ddd; display:none; margin-bottom:10px; background:#f5f5f5; }
        #statusOCR { font-size:12px; font-weight:900; color:var(--biru-vro); text-align:center; min-height:20px; margin-bottom:8px; }
        #hasilOCRMentah { width:100%; height:80px; font-size:11px; background:#f0f0f0; border:1px solid #ddd; border-radius:6px; padding:8px; box-sizing:border-box; resize:none; color:#555; display:none; }
        .label-galeri { font-size:11px; font-weight:900; color:#666; text-transform:uppercase; margin-bottom:4px; display:block; }

        #listContainer { max-height: 350px; overflow-y: auto; border: 1px solid #ddd; padding: 5px; border-radius: 10px; background: #fdfdfd; margin-bottom: 10px; }
        .row-item { display: flex; gap: 4px; align-items: center; margin-bottom: 4px; background: #fff; padding: 5px; border-radius: 6px; border: 1px solid #eee; }
        .in-nama { flex: 1; border: none; font-weight: bold; text-transform: uppercase; font-size: 13px; outline: none; }
        .in-kg { width: 45px; text-align: center; background: #fffde7; border: 1px solid #ffe082; font-weight: 900; border-radius: 4px; }
        .in-hrg { width: 60px; text-align: center; background: #e3f2fd; border: 1px solid #bbdefb; font-weight: 900; border-radius: 4px; }

        #bonWrapper { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:9999; overflow-y:auto; }
        #bonCaptureArea { display: flex; justify-content: center; padding: 20px 10px; }
        #bonDigital { background:#fff; border: 1px solid #000; padding: 15px; width: 100%; max-width: 380px; box-sizing: border-box; position: relative; }
        .seni-ar-bg { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); font-family: serif; font-size: 110px; font-weight: 900; color: rgba(27, 94, 32, 0.07); z-index: 0; pointer-events: none; letter-spacing: 20px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 2px 0; }
        
        .btn-vro { padding: 14px; border: none; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%; }

        /* Loading spinner */
        .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-radius:50%; border-top-color:#fff; animation: spin 0.8s linear infinite; vertical-align:middle; margin-right:6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Tag hasil parse galeri */
        .tag-item { display:inline-block; background:#e8f5e9; border:1px solid #a5d6a7; border-radius:4px; padding:2px 8px; margin:2px; font-size:11px; font-weight:bold; cursor:pointer; }
        .tag-item:hover { background:#c8e6c9; }
        #hasilParseGaleri { margin-top:8px; }
    </style>
</head>
<body>

<div class="container" id="mesinUtama">
    <div class="vro-header">
        <h2>KEDAI SAYUR AR</h2>
        <span>VRO-ULTIMATE LIMITED LIVE</span>
    </div>

    <div class="grid-top">
        <button class="btn-top" style="background:var(--merah-vro);" onclick="aktifkanMata()">👁️ MATA AI</button>
        <button class="btn-top" style="background:var(--emas-vro);" onclick="bukaGaleri()">🖼️ GALERI</button>
        <button class="btn-top" style="background:var(--biru-vro);" onclick="bukaTempel()">📋 TEMPEL</button>
    </div>

    <input type="text" id="manualNama" placeholder="NAMA PEMBELI..." style="width:100%; padding:14px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc; font-weight: 900; box-sizing: border-box; text-transform: uppercase;">

    <div id="listContainer"></div>
    
    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
        <button onclick="tambahBaris()" style="padding:12px; background:#f0f0f0; border:1px dashed #999; border-radius:8px; font-weight:bold;">+ BARANG</button>
        <button class="btn-vro" style="background:var(--hijau-ar);" onclick="generateBon()">🚀 BON</button>
    </div>

    <button onclick="toggleLive()" style="width:100%; margin-top:10px; background:#000; color:#fff; border-radius:8px; padding:8px; font-size:11px; font-weight:900;">📺 LIVE MEDIA ECOSYSTEM</button>
</div>

<!-- LIVE WINDOW -->
<div id="liveWindow">
    <div class="live-header">
        <span>LIVE VRO ECOSYSTEM</span>
        <span onclick="toggleLive()" style="cursor:pointer; font-size:14px;">[ X ]</span>
    </div>
    <iframe id="liveContent" src="https://m.facebook.com"></iframe>
</div>

<!-- KAMERA / TIMBANGAN -->
<div id="mediaOverlay">
    <video id="cameraView" autoplay playsinline></video>
    <div class="media-controls">
        <button class="btn-vro" style="background:#666; width:80px; font-size:10px;" onclick="tutupMedia()">BATAL</button>
        <button id="btnAmbil" class="btn-vro" style="background:var(--hijau-ar); flex:1; margin-left:10px;">SINKRONISASI...</button>
    </div>
    <!-- File input tersembunyi untuk GALERI - dipindah ke sini agar tidak konflik -->
    <input type="file" id="fileInput" accept="image/*" capture style="display:none;">
</div>

<!-- MODAL TEMPEL -->
<div id="modalTempel" class="modal">
    <div class="modal-content">
        <h3 style="margin:0 0 10px 0; color:var(--biru-vro); text-align:center;">JALUR TEMPEL TXT</h3>
        <textarea id="inputTempel" placeholder="Salin list di sini..."></textarea>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
            <button class="btn-vro" style="background:#666;" onclick="tutupTempel()">BATAL</button>
            <button class="btn-vro" style="background:var(--hijau-ar);" onclick="prosesTempel()">PROSES</button>
        </div>
    </div>
</div>

<!-- ===== MODAL GALERI (BARU & DIPERBAIKI) ===== -->
<div id="modalGaleri" class="modal" style="display:none;">
    <div class="modal-content">
        <h3 style="margin:0 0 10px 0; color:var(--emas-vro); text-align:center;">📷 BACA BON / NOTA GALERI</h3>
        
        <img id="previewGaleri" src="" alt="Preview">
        <div id="statusOCR">Pilih gambar bon/nota dari galeri</div>
        
        <div id="hasilParseGaleri"></div>

        <span class="label-galeri">Teks Mentah (opsional lihat)</span>
        <textarea id="hasilOCRMentah" readonly placeholder="Teks OCR akan muncul di sini..."></textarea>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
            <button class="btn-vro" style="background:#666;" onclick="tutupGaleri()">BATAL</button>
            <button class="btn-vro" style="background:var(--emas-vro); color:#000;" onclick="document.getElementById('fileGaleri').click()">📂 PILIH GAMBAR</button>
        </div>
        <div id="btnMasukkanSemua" style="display:none; margin-top:10px;">
            <button class="btn-vro" style="background:var(--hijau-ar);" onclick="masukkanSemuaItem()">✅ MASUKKAN KE KASIR</button>
        </div>

        <input type="file" id="fileGaleri" accept="image/*" style="display:none;" onchange="prosesGambarGaleri(this)">
    </div>
</div>

<!-- BON -->
<div id="bonWrapper">
    <div id="bonCaptureArea">
        <div id="bonDigital">
            <div class="seni-ar-bg">AR</div>
            <div style="display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 5px;">
                <div style="z-index:1;">
                    <h3 style="margin:0; color:var(--hijau-ar); font-size:20px;">KEDAI AR</h3>
                    <div style="font-size:9px; font-weight:bold;">Pasar Pulau Payung, Dumai, Riau</div>
                    <div style="font-size:11px; font-weight:900;">📞 082252939502</div>
                </div>
                <div style="text-align:right; z-index:1;">
                    <div style="font-size:16px; font-weight:900;" id="outNama"></div>
                    <div style="font-size:10px; font-weight:900; color:var(--biru-vro);">VRO LIMITED</div>
                </div>
            </div>
            <div id="outBody" style="z-index:1; position:relative;"></div>
            <div style="margin-top:10px; border-top:2px solid #000; padding-top:5px; display:flex; justify-content:space-between; align-items:flex-end; z-index:1; position:relative;">
                <div>
                    <div style="font-size:11px; font-weight:900;">TOTAL BAYAR</div>
                    <div style="font-size:30px; font-weight:900; color:var(--hijau-ar); line-height:1;" id="outTotal"></div>
                    <div style="font-size:10px; font-weight:bold; font-style:italic; color:#1b5e20;">"Segar Barokah, Belanja Berkah"</div>
                </div>
            </div>
        </div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:20px; max-width:400px; margin:auto;">
        <button class="btn-vro" style="background:#333;" onclick="tutupBon()">KEMBALI</button>
        <button class="btn-vro" style="background:#25d366;" onclick="shareWA()">KIRIM WA</button>
    </div>
</div>

<script>
    let modelAI;
    let deteksiNama = "SAYUR";
    let deteksiBerat = "0.000";
    let itemsGaleri = []; // Simpan hasil parse galeri

    // ==========================================
    // MESIN UTAMA
    // ==========================================
    function tambahBaris(n='', k='', h='') {
        const container = document.getElementById('listContainer');
        const div = document.createElement('div');
        div.className = 'row-item';
        div.innerHTML = `<div style="font-size:9px; font-weight:900; width:15px; color:#999;">${container.children.length + 1}</div>
            <input type="text" class="in-nama" value="${n}" placeholder="NAMA">
            <input type="text" class="in-kg" value="${k}" placeholder="Kg">
            <input type="number" class="in-hrg" value="${h}" placeholder="Hrg">
            <button style="color:red; border:none; background:none; font-weight:bold; cursor:pointer;" onclick="this.parentElement.remove();">×</button>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // ==========================================
    // PERBAIKAN 1: BACA TIMBANGAN (MATA AI)
    // ==========================================
    async function aktifkanMata() {
        const overlay = document.getElementById('mediaOverlay');
        const video = document.getElementById('cameraView');
        const btn = document.getElementById('btnAmbil');
        overlay.style.display = 'block';

        // Filter khusus untuk layar digital timbangan
        video.style.filter = "grayscale(1) contrast(3) brightness(1.2)";

        if (!modelAI) {
            btn.innerText = "⏳ MUAT MODEL AI...";
            try {
                modelAI = await mobilenet.load();
            } catch(e) {
                console.warn("MobileNet gagal muat:", e);
            }
        }
        btn.innerText = "🎯 ARAHKAN KE TIMBANGAN...";

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            });
            video.srcObject = stream;

            // Tunggu video siap
            await new Promise(r => video.onloadedmetadata = r);

            let intervalAktif = true;

            const pembacaTimbangan = setInterval(async () => {
                if (!intervalAktif || overlay.style.display === 'none') {
                    clearInterval(pembacaTimbangan);
                    return;
                }

                try {
                    // Baca angka dari layar timbangan dengan Tesseract
                    // Khusus mode digit (PSM 8 = satu baris angka)
                    const ocr = await Tesseract.recognize(video, 'eng', {
                        tessedit_char_whitelist: '0123456789.,',
                        tessedit_pageseg_mode: '8'
                    });

                    const rawText = ocr.data.text.trim();
                    console.log("OCR raw:", rawText);

                    // Cari semua angka desimal yang mungkin jadi berat
                    // Format timbangan: 0.500 / 1.250 / 0,500 / 1,250
                    let beratDitemukan = null;

                    // Coba pola desimal dengan titik atau koma
                    const polaBerat = rawText.match(/(\d{1,2}[.,]\d{2,3})/g);
                    if (polaBerat) {
                        // Ambil angka yang masuk akal sebagai berat (0.05 - 99.999 kg)
                        for (let p of polaBerat) {
                            const angka = parseFloat(p.replace(',', '.'));
                            if (angka > 0.01 && angka < 100) {
                                beratDitemukan = angka.toFixed(3);
                                break;
                            }
                        }
                    }

                    // Fallback: angka bulat (misal timbangan tampilkan "500" = 0.500 kg)
                    if (!beratDitemukan) {
                        const polaGram = rawText.match(/\b(\d{3,5})\b/);
                        if (polaGram) {
                            const gram = parseInt(polaGram[1]);
                            if (gram >= 50 && gram <= 50000) {
                                beratDitemukan = (gram / 1000).toFixed(3);
                            }
                        }
                    }

                    if (beratDitemukan) {
                        deteksiBerat = beratDitemukan;
                        btn.innerHTML = `✅ BERAT: <strong>${deteksiBerat} KG</strong> — TAP UNTUK SIMPAN`;
                        btn.style.background = '#2e7d32';
                    } else {
                        btn.innerHTML = `🔍 Mendeteksi... (${rawText || 'cari angka'})`;
                        btn.style.background = '#e65100';
                    }

                    // Nama barang (opsional dari AI)
                    if (modelAI) {
                        const pred = await modelAI.classify(video);
                        let n = pred[0].className.split(',')[0].toUpperCase();
                        deteksiNama = (n.includes("SCALE") || n.includes("MEASURE") || n.includes("WEIGHT")) ? "SAYUR AR" : n;
                    }

                } catch(e) {
                    console.warn("Proses OCR error:", e);
                }
            }, 1500);

            btn.onclick = () => {
                intervalAktif = false;
                clearInterval(pembacaTimbangan);
                tambahBaris(deteksiNama, deteksiBerat, '');
                tutupMedia();
            };

        } catch (e) {
            alert("❌ Kamera gagal dibuka: " + e.message);
            overlay.style.display = 'none';
        }
    }

    function tutupMedia() {
        const video = document.getElementById('cameraView');
        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('mediaOverlay').style.display = 'none';
    }

    // ==========================================
    // PERBAIKAN 2: BACA BON/NOTA DARI GALERI
    // ==========================================
    function bukaGaleri() {
        // Reset state
        itemsGaleri = [];
        document.getElementById('previewGaleri').style.display = 'none';
        document.getElementById('statusOCR').innerText = 'Pilih gambar bon/nota dari galeri';
        document.getElementById('hasilOCRMentah').style.display = 'none';
        document.getElementById('hasilOCRMentah').value = '';
        document.getElementById('hasilParseGaleri').innerHTML = '';
        document.getElementById('btnMasukkanSemua').style.display = 'none';
        document.getElementById('modalGaleri').style.display = 'flex';
    }

    function tutupGaleri() {
        document.getElementById('modalGaleri').style.display = 'none';
    }

    async function prosesGambarGaleri(input) {
        if (!input.files || !input.files[0]) return;

        const file = input.files[0];
        const statusEl = document.getElementById('statusOCR');
        const previewEl = document.getElementById('previewGaleri');
        const hasilMentahEl = document.getElementById('hasilOCRMentah');
        const hasilParseEl = document.getElementById('hasilParseGaleri');
        const btnMasuk = document.getElementById('btnMasukkanSemua');

        // Tampilkan preview gambar
        const reader = new FileReader();
        reader.onload = (e) => {
            previewEl.src = e.target.result;
            previewEl.style.display = 'block';
        };
        reader.readAsDataURL(file);

        // Mulai OCR
        statusEl.innerHTML = '<span class="spinner"></span> Membaca gambar... harap tunggu';
        hasilParseEl.innerHTML = '';
        btnMasuk.style.display = 'none';
        itemsGaleri = [];

        try {
            // Jalankan Tesseract OCR dengan bahasa Indonesia + Inggris
            const result = await Tesseract.recognize(file, 'ind+eng', {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        statusEl.innerHTML = `<span class="spinner"></span> Memproses... ${Math.round(m.progress * 100)}%`;
                    }
                }
            });

            const teks = result.data.text;
            console.log("OCR Galeri:", teks);

            // Tampilkan teks mentah
            hasilMentahEl.value = teks;
            hasilMentahEl.style.display = 'block';

            // Parse teks bon/nota
            itemsGaleri = parseTeksBon(teks);

            if (itemsGaleri.length > 0) {
                statusEl.innerHTML = `✅ Ditemukan <strong>${itemsGaleri.length} item</strong>`;
                
                let html = '<div style="margin-bottom:6px; font-size:11px; font-weight:900; color:#555;">ITEM DITEMUKAN (tap untuk edit):</div>';
                itemsGaleri.forEach((item, i) => {
                    html += `<div class="tag-item" onclick="editItemGaleri(${i})">
                        ${i+1}. ${item.nama} | ${item.kg}kg | Rp${item.hrg || '?'}rb
                    </div>`;
                });
                hasilParseEl.innerHTML = html;
                btnMasuk.style.display = 'block';
            } else {
                // Coba parse manual dari teks
                statusEl.innerHTML = '⚠️ Tidak ada item terdeteksi otomatis. Cek teks mentah.';
                hasilParseEl.innerHTML = `<div style="font-size:11px; color:#e65100; padding:8px; background:#fff3e0; border-radius:6px;">
                    Teks berhasil dibaca tapi format tidak dikenali. 
                    Gunakan <strong>📋 TEMPEL</strong> untuk input manual dari teks di atas.
                    <br><br>
                    <button class="btn-vro" style="background:var(--biru-vro); font-size:11px; padding:8px;" onclick="pakaiTeksMentah()">📋 PINDAH KE TEMPEL</button>
                </div>`;
            }

        } catch (e) {
            statusEl.innerHTML = '❌ Gagal baca gambar: ' + e.message;
            console.error("OCR Galeri error:", e);
        }

        // Reset file input agar bisa pilih lagi
        input.value = '';
    }

    // ==========================================
    // PARSER CERDAS TEKS BON/NOTA
    // ==========================================
    function parseTeksBon(teks) {
        const baris = teks.split('\n').map(b => b.trim()).filter(b => b.length > 1);
        const items = [];

        for (let b of baris) {
            // Pola 1: "KANGKUNG 1.5 kg 3000" atau "KANGKUNG 1,5 3.000"
            let m = b.match(/([A-Za-z\s]{2,20})\s+([\d.,]+)\s*(?:kg|Kg|KG)?\s+([\d.,]+)/i);
            if (m) {
                const nama = m[1].trim().toUpperCase();
                const kg = parseFloat(m[2].replace(',', '.')) || 0;
                const hrg = bersihkanAngka(m[3]);
                if (nama.length >= 2 && kg > 0) {
                    items.push({ nama, kg: kg.toFixed(3), hrg: hrg || '' });
                    continue;
                }
            }

            // Pola 2: "1. TOMAT 2kg @5rb = 10.000"
            m = b.match(/\d+[.)]\s*([A-Za-z\s]{2,20})\s+([\d.,]+)\s*(?:kg)?\s*[@x]\s*(\d+)/i);
            if (m) {
                const nama = m[1].trim().toUpperCase();
                const kg = parseFloat(m[2].replace(',', '.')) || 0;
                const hrg = parseInt(m[3]) || 0;
                if (nama.length >= 2 && kg > 0) {
                    items.push({ nama, kg: kg.toFixed(3), hrg: hrg || '' });
                    continue;
                }
            }

            // Pola 3: "BAYAM 500g 2500" (dalam gram)
            m = b.match(/([A-Za-z\s]{2,20})\s+([\d]+)\s*g\s+([\d.,]+)/i);
            if (m) {
                const nama = m[1].trim().toUpperCase();
                const kg = (parseInt(m[2]) / 1000).toFixed(3);
                const hrg = bersihkanAngka(m[3]);
                if (nama.length >= 2) {
                    items.push({ nama, kg, hrg: hrg || '' });
                    continue;
                }
            }
        }

        return items;
    }

    function bersihkanAngka(str) {
        // "3.000" atau "3,000" atau "3000" -> 3
        const s = str.replace(/[.,]/g, '');
        const n = parseInt(s);
        if (isNaN(n)) return '';
        // Kalau lebih dari 999, kemungkinan sudah dalam satuan rupiah (misal 3000)
        // Kita simpan dalam ribuan untuk kolom harga
        if (n >= 1000) return Math.round(n / 1000);
        return n;
    }

    function editItemGaleri(i) {
        const item = itemsGaleri[i];
        const namaBaru = prompt(`Edit nama item ${i+1}:`, item.nama);
        if (namaBaru !== null) itemsGaleri[i].nama = namaBaru.toUpperCase();
        const kgBaru = prompt(`Edit berat (kg):`, item.kg);
        if (kgBaru !== null) itemsGaleri[i].kg = kgBaru;
        const hrgBaru = prompt(`Edit harga (ribuan, contoh 3 = Rp3.000/kg):`, item.hrg);
        if (hrgBaru !== null) itemsGaleri[i].hrg = hrgBaru;
        
        // Refresh tampilan
        let html = '<div style="margin-bottom:6px; font-size:11px; font-weight:900; color:#555;">ITEM DITEMUKAN (tap untuk edit):</div>';
        itemsGaleri.forEach((item, idx) => {
            html += `<div class="tag-item" onclick="editItemGaleri(${idx})">
                ${idx+1}. ${item.nama} | ${item.kg}kg | Rp${item.hrg || '?'}rb
            </div>`;
        });
        document.getElementById('hasilParseGaleri').innerHTML = html;
    }

    function masukkanSemuaItem() {
        if (itemsGaleri.length === 0) return;
        itemsGaleri.forEach(item => {
            tambahBaris(item.nama, item.kg, item.hrg || '');
        });
        tutupGaleri();
        alert(`✅ ${itemsGaleri.length} item berhasil dimasukkan ke kasir!`);
    }

    function pakaiTeksMentah() {
        const teks = document.getElementById('hasilOCRMentah').value;
        tutupGaleri();
        document.getElementById('inputTempel').value = teks;
        document.getElementById('modalTempel').style.display = 'flex';
    }

    // ==========================================
    // TEMPEL
    // ==========================================
    function bukaTempel() { document.getElementById('modalTempel').style.display = 'flex'; }
    function tutupTempel() { document.getElementById('modalTempel').style.display = 'none'; }
    function prosesTempel() {
        const lines = document.getElementById('inputTempel').value.split('\n');
        lines.forEach(l => { if(l.trim()){ let p = l.split(/\s+/); tambahBaris(p[0], p[1]||'', ''); }});
        tutupTempel();
    }

    // ==========================================
    // LIVE
    // ==========================================
    function toggleLive() {
        const win = document.getElementById('liveWindow');
        win.style.display = (win.style.display === 'block') ? 'none' : 'block';
    }

    // ==========================================
    // GENERATE BON
    // ==========================================
    function generateBon() {
        const rows = document.querySelectorAll('.row-item');
        let html = ""; let total = 0;
        rows.forEach((row, i) => {
            const n = row.querySelector('.in-nama').value;
            const k = parseFloat(row.querySelector('.in-kg').value) || 0;
            const h = parseFloat(row.querySelector('.in-hrg').value) || 0;
            if(n) {
                const sub = k * h * 1000; total += sub;
                html += `<div class="item-row">
                    <div style="flex:1;">
                        <div style="font-size:14px; font-weight:900; text-transform:uppercase;">${i+1}. ${n}</div>
                        <div style="font-size:14px; font-weight:bold;"><span style="color:var(--biru-vro); font-size:16px;">${k} kg</span> x Rp ${h}.000</div>
                    </div>
                    <div style="font-size:19px; font-weight:900;">${sub.toLocaleString('id-ID')}</div>
                </div>`;
            }
        });
        document.getElementById('outNama').innerText = document.getElementById('manualNama').value || "PELANGGAN SETIA";
        document.getElementById('outBody').innerHTML = html;
        document.getElementById('outTotal').innerText = "Rp " + total.toLocaleString('id-ID');
        document.getElementById('bonWrapper').style.display = 'block';
    }

    function tutupBon() { document.getElementById('bonWrapper').style.display = 'none'; }

    async function shareWA() {
        const area = document.getElementById('bonCaptureArea');
        const canvas = await html2canvas(area, { scale: 3 });
        canvas.toBlob(blob => {
            const file = new File([blob], "BonAR_Vro_Limited.png", { type: "image/png" });
            if (navigator.share) {
                navigator.share({ files: [file], title: 'Bon Kedai AR', text: 'Terima kasih telah berbelanja!' });
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'BonAR_Vro_Limited.png';
                a.click();
            }
        });
    }
</script>
